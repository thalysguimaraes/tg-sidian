name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-26

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Select Xcode 26.6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Test Swift package
        run: swift test

      - name: Build macOS app
        run: |
          xcodebuild \
            -project TGSidian.xcodeproj \
            -scheme TGSidian \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO
