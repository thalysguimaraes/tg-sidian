name: TGSidian
options:
  bundleIdPrefix: design.thalys
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  minimumXcodeGenVersion: 2.44.1

packages:
  TGSidianKit:
    path: .

targets:
  TGSidian:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/TGSidianApp
        excludes:
          - Resources
      - path: Sources/TGSidianApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TGSidianApp/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TGSidianApp/Resources/Info.plist
      properties:
        CFBundleDisplayName: tg-sidian
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
    entitlements:
      path: Sources/TGSidianApp/Resources/TGSidian.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.files.user-selected.read-write: true
    dependencies:
      - package: TGSidianKit
        product: FeatureUI
      - package: TGSidianKit
        product: SecurityKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Sources/TGSidianApp/Resources/TGSidian.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SELECTED_FILES: readwrite
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/TGSidianApp/Resources/Info.plist
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: design.thalys.tg-sidian
        PRODUCT_MODULE_NAME: TGSidianApp
        PRODUCT_NAME: tg-sidian
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: 6.0
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  TGSidian:
    build:
      targets:
        TGSidian: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
